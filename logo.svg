<svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Multifamily Flooring Vector Logo - Transparent & Optimized -->
  <g transform="translate(50, 40)">
    <!-- Symmetric Herringbone Planks -->
    
    <!-- Outer Left (Sage Light) -->
    <rect x="-42" y="-12" width="28" height="10" fill="#B8C9B0" transform="rotate(-45)" rx="1.5"/>
    
    <!-- Mid Left (Olive Medium) -->
    <rect x="-28" y="-4" width="28" height="10" fill="#5B7258" transform="rotate(-45)" rx="1.5"/>
    
    <!-- Center Left (Forest Dark) -->
    <rect x="-14" y="4" width="28" height="10" fill="#2D4330" transform="rotate(-45)" rx="1.5"/>
    
    <!-- Outer Right (Sage Light) -->
    <rect x="14" y="-12" width="28" height="10" fill="#B8C9B0" transform="rotate(45)" rx="1.5"/>
    
    <!-- Mid Right (Olive Medium) -->
    <rect x="0" y="-4" width="28" height="10" fill="#5B7258" transform="rotate(45)" rx="1.5"/>
    
    <!-- Center Right (Forest Dark) -->
    <rect x="-14" y="4" width="28" height="10" fill="#2D4330" transform="rotate(45)" rx="1.5"/>
  </g>
</svg>
